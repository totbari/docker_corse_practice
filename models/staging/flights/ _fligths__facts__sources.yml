sources:
  - name: demo_src
    database: dwh_fligth
    schema: demo_src
    description: Данные из БД авиаперелеты
    tables:
      - name: aircrafts
        description:  Модель самолёта 
        columns:
          - name: aircraft_code
            description: Код модели самолета
            tests:
              - not_null
              - unique
          - name: model
            description: Название модели самолета 
          - name: range
            description: Растояние полета самолета 
      - name: airports
        description: Маршруты аэропортов
        columns:
          - name: airport_code
            description: код аэропортов
          - name: airport_name
            description: Название
          - name: city
            description: Город
          - name: coordinates
            description: Коорденаты
          - name: timezone
            description: Временная зона
      - name: seats
        description: Места в самолете
        columns:
          - name: aircraft_code
            description: Код модели самалета
          - name: seat_no
            description: Номер места
          - name: fare_conditions
            description: Класс места 
      - name: boarding_passes
        description: Посадочные талоны
        columns:
          - name: ticket_no
            description: Номер билета
          - name: flight_id
            description: Идентификатор рейса
          - name: boarding_no
            description: Номер посадочного талона
          - name: seat_no
            description: Номер места
      - name: flights  #проверку на свежесть данных в таблице flights по колонке actual_departure
        description: Рейсы
        columns:
          - name: flight_id
            description: Идентификатор рейса
          - name: flight_no
            description: нет данных
          - name: scheduled_departure
            description: Время вылета по расписанию
          - name: scheduled_arrival
            description: Время прилёта по расписания
          - name: departure_airport
            description: нет данных
          - name: arrival_airport
            description: Фактическое время прилёта
          - name: status
            description: нет данных
          - name: aircraft_code
            description: нет данных
          - name: actual_departure
            description: Фактическое время вылета
          - name: actual_arrival
            description: нет данных
        freshness:
          warn_after:
           count: 6
           period: hour
          error_after:
            count: 1
            period: day
          filter: "actual_departure <= CURRENT_DATE"
        loaded_at_field: actual_departure::timestamp 
      - name: ticket_flights
        description: Связующие рейсы 
        columns:
          - name: ticket_no
            description: нет данных
          - name: flight_id
            description: нет данных
          - name: fare_conditions
            description: нет данных
          - name: amount
            description: нет данных
      - name: tickets
        description: билеты
        columns:
          - name: ticket_no
            description: Номер билета
          - name: book_ref
            description: Номер бронирования
          - name: passenger_id
            description: Идентификатор пассажира
          - name: passenger_name
            description: Имя пассажира
          - name: contact_data
            description: нет данных 
